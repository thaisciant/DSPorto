  <text x="56" y="394" font-size="14" font-weight="700" fill="#ffffff">Cliente</text>
  <text x="376" y="394" font-size="14" font-weight="700" fill="#ffffff">Produtos</text>
  <text x="616" y="394" font-size="14" font-weight="700" fill="#ffffff">Origem</text>
  <text x="836" y="394" font-size="14" font-weight="700" fill="#ffffff">Contato</text>
  <text x="1096" y="394" font-size="14" font-weight="700" fill="#ffffff">Ações</text>

  <!-- ── ROW 1 ── -->
  <rect x="32" y="419" width="1216" height="80" rx="4" fill="#ffffff" filter="url(#shadow)"/>
  <text x="56" y="452" font-size="14" font-weight="600" fill="#1a1a1a">Ana Paula Ferreira</text>
  <text x="56" y="470" font-size="12" fill="#888888">123.456.789-00</text>
  <text x="376" y="462" font-size="14" fill="#1a1a1a">Auto</text>
  <text x="616" y="462" font-size="14" fill="#1a1a1a">App Porto</text>
  <text x="836" y="462" font-size="14" fill="#1a1a1a">(11) 98765-4321</text>
  <!-- 3-dot menu -->
  <circle cx="1113" cy="455" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="463" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="471" r="3" fill="#0046c0"/>

  <!-- ── ROW 2 ── -->
  <rect x="32" y="507" width="1216" height="80" rx="4" fill="#ffffff" filter="url(#shadow)"/>
  <text x="56" y="540" font-size="14" font-weight="600" fill="#1a1a1a">Carlos Eduardo Souza</text>
  <text x="56" y="558" font-size="12" fill="#888888">987.654.321-00</text>
  <text x="376" y="550" font-size="14" fill="#1a1a1a">Residencial</text>
  <text x="616" y="550" font-size="14" fill="#1a1a1a">Site Porto</text>
  <text x="836" y="550" font-size="14" fill="#1a1a1a">(21) 91234-5678</text>
  <circle cx="1113" cy="543" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="551" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="559" r="3" fill="#0046c0"/>

  <!-- ── ROW 3 ── -->
  <rect x="32" y="595" width="1216" height="80" rx="4" fill="#ffffff" filter="url(#shadow)"/>
  <text x="56" y="628" font-size="14" font-weight="600" fill="#1a1a1a">Mariana Costa Lima</text>
  <text x="56" y="646" font-size="12" fill="#888888">456.789.123-00</text>
  <text x="376" y="638" font-size="14" fill="#1a1a1a">Vida · Auto</text>
  <text x="616" y="638" font-size="14" fill="#1a1a1a">App Porto</text>
  <text x="836" y="638" font-size="14" fill="#1a1a1a">(31) 99876-5432</text>
  <circle cx="1113" cy="631" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="639" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="647" r="3" fill="#0046c0"/>

  <!-- ── ROW 4 ── -->
  <rect x="32" y="683" width="1216" height="80" rx="4" fill="#ffffff" filter="url(#shadow)"/>
  <text x="56" y="716" font-size="14" font-weight="600" fill="#1a1a1a">Roberto Alves Mendes</text>
  <text x="56" y="734" font-size="12" fill="#888888">321.654.987-00</text>
  <text x="376" y="726" font-size="14" fill="#1a1a1a">Empresarial</text>
  <text x="616" y="726" font-size="14" fill="#1a1a1a">Whatsapp</text>
  <text x="836" y="726" font-size="14" fill="#1a1a1a">(41) 98765-1234</text>
  <circle cx="1113" cy="719" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="727" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="735" r="3" fill="#0046c0"/>

  <!-- ── ROW 5 ── -->
  <rect x="32" y="771" width="1216" height="80" rx="4" fill="#ffffff" filter="url(#shadow)"/>
  <text x="56" y="804" font-size="14" font-weight="600" fill="#1a1a1a">Fernanda Oliveira</text>
  <text x="56" y="822" font-size="12" fill="#888888">654.321.098-00</text>
  <text x="376" y="814" font-size="14" fill="#1a1a1a">Viagem</text>
  <text x="616" y="814" font-size="14" fill="#1a1a1a">Site Porto</text>
  <text x="836" y="814" font-size="14" fill="#1a1a1a">(51) 97654-3210</text>
  <circle cx="1113" cy="807" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="815" r="3" fill="#0046c0"/>
  <circle cx="1113" cy="823" r="3" fill="#0046c0"/>

  <!-- ══════════════════════════════════════════
       PAGINATION
  ══════════════════════════════════════════ -->
  <rect x="32" y="859" width="1216" height="36" rx="8" fill="#f7f7f7"/>
  <!-- Arrows left -->
  <text x="80" y="882" font-size="10" fill="#b3b3b3" text-anchor="middle">◀◀</text>
  <text x="108" y="882" font-size="10" fill="#b3b3b3" text-anchor="middle">◀</text>
  <!-- Divider -->
  <line x1="128" y1="865" x2="128" y2="889" stroke="#e0e0e0"/>
  <!-- Pages -->
  <rect x="600" y="863" width="24" height="24" rx="12" fill="#e8f0fe"/>
  <text x="612" y="880" font-size="12" font-weight="700" fill="#0046c0" text-anchor="middle">1</text>
  <text x="646" y="880" font-size="12" fill="#1a1a1a" text-anchor="middle">2</text>
  <!-- Divider -->
  <line x1="680" y1="865" x2="680" y2="889" stroke="#e0e0e0"/>
  <!-- Arrows right -->
  <text x="700" y="882" font-size="10" fill="#b3b3b3" text-anchor="middle">▶</text>
  <text x="728" y="882" font-size="10" fill="#b3b3b3" text-anchor="middle">▶▶</text>

  <!-- ── Shadow filter ── -->
  <defs>
    <filter id="shadow" x="-2%" y="-5%" width="104%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="rgba(0,0,0,0.09)"/>
    </filter>
  </defs>

</svg>
