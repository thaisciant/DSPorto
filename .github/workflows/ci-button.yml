name: Button Component CI

on:
  push:
    paths:
      - 'packages/button-web/**'
      - 'packages/button-ios/**'
      - 'packages/button-android/**'
      - 'packages/tokens/**'
  pull_request:
    paths:
      - 'packages/button-web/**'
      - 'packages/button-ios/**'
      - 'packages/button-android/**'

jobs:
  # ── Web (React/TypeScript) ──────────────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/button-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint (zero warnings)
        run: npm run lint
      - name: Test + coverage
        run: npm test -- --coverage
      # Coverage gate: ≥ 80% overall, ≥ 85% ViewModel — enforced by vite.config.ts thresholds
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: packages/button-web/coverage/

  # ── iOS (Swift/SwiftUI) ─────────────────────────────────────────────────────
  ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: packages/button-ios
    steps:
      - uses: actions/checkout@v4
      - name: Lint (SwiftLint zero errors)
        run: swiftlint lint --strict Sources/
      - name: Test + coverage (≥ 80%)
        run: |
          xcodebuild test \
            -scheme PSButton \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: packages/button-ios/TestResults.xcresult

  # ── Android (Kotlin/Compose) ────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/button-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Lint (ktlint zero errors)
        run: ./gradlew ktlintCheck
      - name: Lint (Detekt)
        run: ./gradlew detekt
      - name: Unit tests + Paparazzi snapshots
        run: ./gradlew testDebugUnitTest
      - name: Coverage report (≥ 80% — JaCoCo threshold enforced in build.gradle.kts)
        run: ./gradlew jacocoTestReport
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage
          path: packages/button-android/build/reports/jacoco/
