<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrototypeNotes — Preview</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; }
    :focus-visible { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React

    // ─── Inline icons ─────────────────────────────────────────────────────────
    const InfoIcon = ({ s = 20 }) => (
      <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 15a1 1 0 01-1-1v-4a1 1 0 112 0v4a1 1 0 01-1 1zm0-8a1 1 0 110-2 1 1 0 010 2z" />
      </svg>
    )

    const ChevronUpIcon = ({ s = 14 }) => (
      <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <polyline points="18 15 12 9 6 15" />
      </svg>
    )

    // ─── Demo scenarios ────────────────────────────────────────────────────────
    const SCENARIOS = [
      {
        id: 'creator-view',
        label: 'Visão do criador',
        screen: 'Detalhe do bundle — AI Quality Assurance',
        notes: [
          {
            id: 'creator-only',
            description: 'Esta visão é exclusiva do criador do bundle. Demais usuários veem apenas as soluções disponíveis — sem indicativo de conteúdo ausente. Na tela de edição, o criador visualiza no componente drag-and-drop somente as soluções do bundle que ainda estão disponíveis no catálogo.',
          },
        ],
      },
      {
        id: 'admin-scope',
        label: 'Visão de admin',
        screen: 'Painel de distribuição',
        notes: [
          {
            id: 'admin-note',
            description: 'Esta tela é visível apenas para administradores da conta. Usuários comuns não têm acesso à configuração de distribuição — eles veem apenas os bundles publicados no catálogo.',
          },
        ],
      },
      {
        id: 'multi-notes',
        label: 'Múltiplas notas',
        screen: 'Tela de edição do bundle',
        notes: [
          {
            id: 'scope-note',
            description: 'O fluxo de edição cobre apenas a reordenação e remoção de soluções. A adição de novas soluções ao bundle não está implementada neste protótipo.',
          },
          {
            id: 'drag-note',
            description: 'O componente drag-and-drop exibe somente as soluções ainda disponíveis no catálogo. Soluções removidas do catálogo não aparecem — nem como indisponíveis.',
          },
        ],
      },
      {
        id: 'custom-title',
        label: 'Título customizado',
        screen: 'Comparação de planos',
        notes: [
          {
            id: 'plan-note',
            description: 'Os preços exibidos são fictícios para fins de validação do layout. Os valores reais serão definidos pelo time de produto após pesquisa de pricing.',
          },
        ],
        title: 'Dados simulados',
      },
    ]

    // ─── PrototypeNotes component (with collapse) ──────────────────────────────
    function PrototypeNotes({ notes, title = 'Nota do protótipo', topOffset = 16 }) {
      const [collapsed, setCollapsed] = useState(false)
      if (!notes.length) return null

      if (collapsed) {
        return (
          <button
            type="button"
            onClick={() => setCollapsed(false)}
            style={{
              position: 'fixed', top: topOffset, right: 16, zIndex: 50,
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '8px 12px', borderRadius: 999,
              background: '#3b82f6', color: 'white',
              boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
              border: 'none', cursor: 'pointer', transition: 'background 0.15s',
              fontSize: 12, fontWeight: 600,
            }}
            aria-label={`Expandir: ${title}`}
            onMouseEnter={e => e.currentTarget.style.background = '#2563eb'}
            onMouseLeave={e => e.currentTarget.style.background = '#3b82f6'}
          >
            <InfoIcon s={14} />
            <span style={{ lineHeight: 1 }}>{title}</span>
            {notes.length > 1 && (
              <span style={{
                fontSize: 10, fontWeight: 700, padding: '2px 6px',
                borderRadius: 999, background: 'rgba(255,255,255,0.25)', lineHeight: 1,
              }}>
                {notes.length}
              </span>
            )}
          </button>
        )
      }

      return (
        <div style={{ position: 'fixed', top: topOffset, right: 16, zIndex: 50, display: 'flex', flexDirection: 'column', gap: 8, pointerEvents: 'none' }}>
          {notes.map((note, index) => (
            <div key={note.id}
              style={{
                width: 400, display: 'flex', alignItems: 'flex-start', gap: 12,
                borderRadius: 16, padding: '12px 16px',
                boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
                background: '#3b82f6', color: 'white', pointerEvents: 'auto',
              }}
            >
              <div style={{ flexShrink: 0, marginTop: 2 }}>
                <InfoIcon s={20} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                  <p style={{ fontSize: 16, fontWeight: 700, lineHeight: '24px', margin: 0 }}>{title}</p>
                  {index === 0 && (
                    <button
                      type="button"
                      onClick={() => setCollapsed(true)}
                      style={{
                        flexShrink: 0, padding: 4, borderRadius: 8,
                        background: 'transparent', border: 'none', cursor: 'pointer',
                        color: 'white', opacity: 0.7, transition: 'opacity 0.15s',
                        display: 'flex', alignItems: 'center',
                      }}
                      aria-label="Minimizar nota"
                      onMouseEnter={e => e.currentTarget.style.opacity = '1'}
                      onMouseLeave={e => e.currentTarget.style.opacity = '0.7'}
                    >
                      <ChevronUpIcon s={14} />
                    </button>
                  )}
                </div>
                <p style={{ fontSize: 12, fontWeight: 400, lineHeight: '20px', opacity: 0.9, margin: 0 }}>{note.description}</p>
              </div>
            </div>
          ))}
        </div>
      )
    }

    // ─── Fake prototype background ─────────────────────────────────────────────
    function FakeScreen({ label }) {
      return (
        <div className="min-h-screen bg-[#f8fafc]">
          {/* Topbar */}
          <div className="h-14 bg-white border-b border-[#e2e8f0] flex items-center px-6 gap-3">
            <div className="w-6 h-6 rounded bg-[#000050]" />
            <span style={{ fontSize: 14, fontWeight: 700, color: '#00053c' }}>Flow Platform</span>
            <span style={{ color: '#e2e8f0' }}>|</span>
            <span style={{ fontSize: 14, fontWeight: 600, color: '#000050' }}>Findr</span>
            <div style={{ flex: 1 }} />
            <div className="w-7 h-7 rounded-full bg-[#eef1f7]" />
          </div>

          {/* Fake content */}
          <div className="max-w-3xl mx-auto pt-10 px-8 pb-20">
            {/* Breadcrumb */}
            <div className="flex items-center gap-2 mb-6">
              <span style={{ fontSize: 13, color: '#9ca3af' }}>Catálogo</span>
              <span style={{ color: '#d1d5db' }}>›</span>
              <span style={{ fontSize: 13, color: '#374151', fontWeight: 600 }}>AI Quality Assurance</span>
            </div>

            {/* Screen label */}
            <div className="mb-4 px-3 py-1.5 rounded-full bg-[#eef1f7] inline-flex">
              <span style={{ fontSize: 11, fontWeight: 700, color: '#5f649a', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
                {label}
              </span>
            </div>

            {/* Fake card */}
            <div className="bg-white rounded-2xl border border-[#e2e8f0] p-6 mb-4">
              <div className="flex items-start gap-4 mb-5">
                <div className="w-12 h-12 rounded-xl bg-[#eef1f7]" />
                <div className="flex-1">
                  <div className="h-4 rounded-full bg-[#f1f5f9] mb-2" style={{ width: '45%' }} />
                  <div className="h-3 rounded-full bg-[#f8fafc]" style={{ width: '30%' }} />
                </div>
              </div>
              <div className="space-y-2">
                <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: '90%' }} />
                <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: '75%' }} />
                <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: '60%' }} />
              </div>
            </div>

            {/* Fake solutions list */}
            <div className="bg-white rounded-2xl border border-[#e2e8f0] overflow-hidden">
              <div className="px-5 py-3 bg-[#f9fafb] border-b border-[#e2e8f0]">
                <div className="h-3 rounded-full bg-[#e2e8f0]" style={{ width: '20%' }} />
              </div>
              {[1, 2, 3].map(i => (
                <div key={i} className="flex items-center gap-3 px-5 py-4 border-b border-[#f1f5f9] last:border-0">
                  <div className="w-8 h-8 rounded-lg flex-shrink-0"
                    style={{ background: i === 2 ? '#f3f4f6' : '#eef1f7' }} />
                  <div className="flex-1 space-y-1.5">
                    <div className="flex items-center gap-2">
                      <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: `${20 + i * 12}%` }} />
                      {i === 2 && (
                        <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 999, background: '#f3f4f6', color: '#6b7280' }}>
                          Unavailable
                        </span>
                      )}
                    </div>
                    <div className="h-2.5 rounded-full bg-[#f8fafc]" style={{ width: `${40 + i * 10}%` }} />
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )
    }

    // ─── Control panel ─────────────────────────────────────────────────────────
    function ControlPanel({ active, onSelect }) {
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
          <div className="bg-white border border-[#e2e8f0] rounded-2xl shadow-lg px-5 py-3 flex items-center gap-3">
            <span style={{ fontSize: 11, fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.5px', whiteSpace: 'nowrap' }}>
              Cenário
            </span>
            <div className="w-px h-4 bg-[#e2e8f0]" />
            <div className="flex gap-2">
              {SCENARIOS.map(s => (
                <button key={s.id} type="button" onClick={() => onSelect(s.id)}
                  style={{
                    fontSize: 12, fontWeight: 600, padding: '6px 14px', borderRadius: 999, border: 'none', cursor: 'pointer',
                    background: active === s.id ? '#000050' : '#f1f5f9',
                    color: active === s.id ? 'white' : '#374151',
                    transition: 'all 0.15s',
                  }}>
                  {s.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )
    }

    // ─── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [activeId, setActiveId] = useState(SCENARIOS[0].id)
      const scenario = SCENARIOS.find(s => s.id === activeId) ?? SCENARIOS[0]

      return (
        <>
          <FakeScreen label={scenario.screen} />
          <PrototypeNotes notes={scenario.notes} title={scenario.title} topOffset={72} />
          <ControlPanel active={activeId} onSelect={setActiveId} />
        </>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
