<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevModeDrawer — Preview</title>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; }
    input::placeholder { color: #c4c9d4; }
    :focus-visible { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React

    // ─── Icons ────────────────────────────────────────────────────────────────
    const ICode    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    const IExtLink = ({ s=10 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    const IX       = ({ s=18 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    const IChevD   = ({ s=15 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    const IChevR   = ({ s=15 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    const ISearch  = ({ s=14 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    const IPlay    = ({ s=11 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    const ICopy    = ({ s=13 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    const ICheck   = ({ s=13 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    const IBranch  = ({ s=13 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
    const IRoute   = ({ s=14 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>
    const IDot     = ({ s=14 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>

    function cn(...cls) { return cls.filter(Boolean).join(' ') }

    // ─── Flow Diagram ─────────────────────────────────────────────────────────
    const FLOW_DIAGRAM = `flowchart LR
  A(["Entry"]) --> B["Dashboard"]
  B --> C["Calculator"]
  C --> D{"Calculated?"}
  D -->|"Yes"| E(["History"])
  D -->|"No"| C
  B --> F["Settings"]

  style A fill:#eef1f7,stroke:#232766,color:#232766
  style E fill:#f0fdf4,stroke:#16a34a,color:#14532d`

    function openFlowDiagram() {
      const state = { code: FLOW_DIAGRAM, mermaid: '{"theme":"base"}', autoSync: true, rough: false }
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(state))))
      window.open(`https://mermaid.live/edit#base64:${encoded}`, '_blank', 'noopener')
    }

    // ─── Flow routes ──────────────────────────────────────────────────────────
    const FLOW_ROUTES = []
    const STATUS_META = {
      current:    { label: 'Atual',  color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0' },
      stable:     { label: 'Stable', color: '#3b82f6', bg: '#eff6ff', border: '#bfdbfe' },
      wip:        { label: 'WIP',    color: '#d97706', bg: '#fffbeb', border: '#fde68a' },
      deprecated: { label: 'Dep.',   color: '#9ca3af', bg: '#f9fafb', border: '#e5e7eb' },
    }

    // ─── Telas ────────────────────────────────────────────────────────────────
    const SCREENS = [
      {
        id: 'dashboard', label: 'Dashboard', view: 'dashboard',
        description: 'Visão geral de BCPs calculados por projeto.',
        tags: ['entrada'],
        states: [
          { id: 'default', label: 'Default',    trigger: 'state:dashboard:default', color: '#16a34a' },
          { id: 'loading', label: 'Loading',    trigger: 'state:dashboard:loading', color: '#3b82f6' },
          { id: 'empty',   label: 'Empty',      trigger: 'state:dashboard:empty',   color: '#9ca3af' },
        ],
      },
      {
        id: 'calculator', label: 'Calculator', view: 'calculator',
        description: 'Módulo de cálculo de BCP por issues.',
        tags: ['principal'],
        states: [
          { id: 'default', label: 'Default',   trigger: 'state:calculator:default',  color: '#16a34a' },
          { id: 'loading', label: 'Filtering', trigger: 'state:calculator:loading',  color: '#3b82f6' },
          { id: 'empty',   label: 'No results',trigger: 'state:calculator:empty',    color: '#9ca3af' },
          { id: 'success', label: 'Calculated ✓', trigger: 'state:calculator:success', color: '#16a34a', closesDrawer: true },
        ],
      },
      {
        id: 'settings', label: 'Settings', view: 'settings',
        description: 'Configurações da calculadora.',
        tags: ['config'],
        states: [
          { id: 'default', label: 'Default', trigger: 'state:settings:default', color: '#16a34a' },
        ],
      },
    ]

    // ─── Seções por view ──────────────────────────────────────────────────────
    const DASHBOARD_SECTIONS = [
      {
        id: 'dashboard-states',
        title: 'Dashboard — Estados',
        states: [
          { name: 'default', description: 'Projetos com BCPs calculados. Tabela com paginação.', color: '#16a34a', trigger: 'state:dashboard:default' },
          { name: 'loading', description: 'Skeleton na tabela de projetos.',                      color: '#3b82f6', trigger: 'state:dashboard:loading' },
          { name: 'empty',   description: 'Nenhum projeto configurado ainda.',                    color: '#9ca3af', trigger: 'state:dashboard:empty'   },
        ],
        rules: [
          'empty state: exibir CTA "Add project" — nunca deixar a tela em branco',
          'loading: skeleton com 5 linhas de tabela',
          'Colunas: Project, Provider, Last run, Total BCPs, Status',
        ],
      },
      {
        id: 'dashboard-messages',
        title: 'Mensagens do Sistema',
        groups: [
          {
            name: 'Projetos',
            messages: [
              { scenario: 'Projeto removido',      message: 'Project removed successfully.',          display: 'snackbar-success' },
              { scenario: 'Erro ao remover',       message: 'Failed to remove project. Try again.',   display: 'inline-error'    },
            ],
          },
        ],
      },
    ]

    const CALCULATOR_SECTIONS = [
      {
        id: 'calculator-states',
        title: 'Calculator — Estados',
        states: [
          { name: 'default',  description: 'Issues carregadas, filtros ativos.',                color: '#16a34a', trigger: 'state:calculator:default'  },
          { name: 'loading',  description: 'Buscando issues. Skeleton na tabela.',              color: '#3b82f6', trigger: 'state:calculator:loading'  },
          { name: 'empty',    description: 'Nenhum resultado para os filtros aplicados.',       color: '#9ca3af', trigger: 'state:calculator:empty'    },
          { name: 'success',  description: 'Cálculo concluído. Snackbar + aba History.', color: '#16a34a', trigger: 'state:calculator:success', closesDrawer: true },
          { name: 'error',    description: 'Falha no cálculo. CTA de retry.',                  color: '#dc2626' },
        ],
        rules: [
          'success fecha a drawer automaticamente para o snackbar ficar visível',
          'loading: botão Calculate desabilitado',
          'empty: exibir "No results found" + link "Clear filters"',
          'Batch limit (100 issues): exibir banner inline acima da tabela',
        ],
      },
      {
        id: 'calculator-fields',
        title: 'Filtros — Campos',
        fields: [
          { name: 'Project',    required: true,  description: 'Projeto do provedor. Single-select.',                type: 'single' },
          { name: 'Team',       required: false, description: 'Time responsável pelas issues.',                     type: 'multi'  },
          { name: 'Issue Type', required: false, description: 'Story, Bug, Epic, Task, Improvement.',               type: 'multi'  },
          { name: 'Start Date', required: false, description: 'Data de início do período de análise.',              type: 'single' },
          { name: 'End Date',   required: false, description: 'Data de fim. Não pode ser anterior ao Start Date.',  type: 'single' },
        ],
      },
      {
        id: 'calculator-messages',
        title: 'Mensagens do Sistema',
        groups: [
          {
            name: 'Cálculo',
            messages: [
              { scenario: 'Concluído',          message: 'Calculated successfully. 104 issues · 38 recalculated.', display: 'snackbar-success' },
              { scenario: 'Limite de lote',     message: 'Showing 100 of 142 issues. Adjust filters to refine.',   display: 'inline-error'    },
              { scenario: 'Falha na API',       message: 'Calculation failed. Please try again.',                  display: 'inline-error'    },
            ],
          },
        ],
      },
    ]

    const SETTINGS_SECTIONS = [
      {
        id: 'settings-fields',
        title: 'Configurações — Campos',
        fields: [
          { name: 'Calculator Model', required: true,  description: 'Modelo de cálculo: BCP Simplified, BCP 10+NFR, APF.', type: 'single' },
          { name: 'Issue Types',      required: true,  description: 'Tipos de issue incluídos no cálculo.',                 type: 'multi'  },
          { name: 'Team Size',        required: false, description: 'Tamanho do time para normalização do BCP.',            type: 'single' },
        ],
        rules: [
          'Save button: sempre habilitado — sem auto-save',
          'Confirmação visual após salvar: snackbar "Settings saved"',
          'Modelos "Coming soon": exibir badge e desabilitar seleção',
        ],
      },
      {
        id: 'settings-messages',
        title: 'Mensagens do Sistema',
        groups: [
          {
            name: 'Settings',
            messages: [
              { scenario: 'Salvo com sucesso', message: 'Settings saved successfully.', display: 'snackbar-success' },
              { scenario: 'Erro ao salvar',    message: 'Failed to save settings. Try again.', display: 'inline-error' },
            ],
          },
        ],
      },
      {
        id: 'settings-notes',
        title: 'Notas para o Dev',
        notes: [
          'O campo Calculator Model deve bloquear troca enquanto há cálculo em andamento.',
          'Settings são por projeto — não globais. Salvar não recarrega issues calculadas.',
        ],
      },
    ]

    const SECTIONS_BY_VIEW = {
      dashboard:  DASHBOARD_SECTIONS,
      calculator: CALCULATOR_SECTIONS,
      settings:   SETTINGS_SECTIONS,
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function sectionMatchesQuery(section, q) {
      const l = q.toLowerCase()
      if (section.title.toLowerCase().includes(l)) return true
      if (section.rules?.some(r => r.toLowerCase().includes(l))) return true
      if (section.notes?.some(n => n.toLowerCase().includes(l))) return true
      if (section.states?.some(s => s.name.toLowerCase().includes(l) || s.description.toLowerCase().includes(l))) return true
      if (section.fields?.some(f => f.name.toLowerCase().includes(l) || f.description.toLowerCase().includes(l))) return true
      if (section.groups?.some(g => g.name.toLowerCase().includes(l) || g.messages.some(m => m.message.toLowerCase().includes(l) || m.scenario.toLowerCase().includes(l)))) return true
      return false
    }

    // ─── CopyButton ───────────────────────────────────────────────────────────
    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false)
      return (
        <button type="button" onClick={() => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500) }}
          className="p-1 rounded hover:bg-[#e9ecef] transition-colors shrink-0">
          {copied ? <span className="text-[#16a34a]"><ICheck /></span> : <span className="text-[#9ca3af]"><ICopy /></span>}
        </button>
      )
    }

    // ─── FlowSelector ─────────────────────────────────────────────────────────
    function FlowSelector({ flows, activeId, onChange }) {
      const [open, setOpen] = useState(false)
      const ref = useRef(null)
      const active = flows.find(f => f.id === activeId) ?? flows[0]
      const meta = STATUS_META[active.status]

      useEffect(() => {
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false) }
        document.addEventListener('mousedown', h)
        return () => document.removeEventListener('mousedown', h)
      }, [])

      return (
        <div ref={ref} className="relative flex-1">
          <button type="button" onClick={() => setOpen(v => !v)}
            className="w-full flex items-center gap-1.5 px-3 py-[7px] rounded-lg border border-[#e9ecef] bg-[#f8f9fb] hover:border-[#c7d2e8] hover:bg-white transition-colors">
            <span className="text-[#9ca3af]"><IBranch s={11} /></span>
            <span className="text-[12px] font-semibold text-[#374151] flex-1 truncate text-left">{active.name}</span>
            <span className="text-[10px] font-mono text-[#9ca3af] shrink-0">{active.version}</span>
            <span
              className="text-[10px] font-bold px-1.5 py-0.5 rounded-full shrink-0"
              style={{ color: meta.color, backgroundColor: meta.bg, border: `1px solid ${meta.border}` }}
            >{meta.label}</span>
            <span className={cn('text-[#9ca3af] shrink-0 transition-transform', open && 'rotate-180')}><IChevD s={12} /></span>
          </button>
          {open && (
            <div className="absolute left-0 right-0 top-full mt-1 z-50 bg-white border border-[#e9ecef] rounded-xl shadow-lg overflow-hidden">
              <div className="px-3 py-2 border-b border-[#f3f4f6]">
                <p className="text-[10px] font-bold text-[#9ca3af] uppercase tracking-wider">Fluxos</p>
              </div>
              {flows.map(flow => {
                const m = STATUS_META[flow.status]; const isActive = flow.id === activeId
                return (
                  <button key={flow.id} type="button" onClick={() => { onChange(flow.id); setOpen(false) }}
                    className={cn('w-full text-left flex items-start gap-3 px-3 py-2.5 hover:bg-[#f8f9fb] transition-colors', isActive && 'bg-[#f0f2f8]')}>
                    <span className="mt-[7px] w-1.5 h-1.5 rounded-full shrink-0" style={{ backgroundColor: m.color }} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className={cn('text-[13px] font-semibold', isActive ? 'text-[#000050]' : 'text-[#1f2937]')}>{flow.name}</span>
                        <span className="text-[11px] font-mono text-[#9ca3af]">{flow.version}</span>
                        {isActive && <span className="text-[10px] font-semibold text-[#000050] bg-[#eef1f7] px-1.5 py-0.5 rounded-full">Ativo</span>}
                      </div>
                      {flow.description && <p className="text-[12px] text-[#6b7280] leading-snug mt-0.5">{flow.description}</p>}
                    </div>
                  </button>
                )
              })}
            </div>
          )}
        </div>
      )
    }

    // ─── ScreensSection ───────────────────────────────────────────────────────
    function ScreensSection({ screens, currentView, flows, activeFlowId, onFlowChange, onTrigger }) {
      const initialId = currentView
        ? (screens.find(s => s.view === currentView)?.id ?? screens[0]?.id ?? '')
        : (screens[0]?.id ?? '')

      const [selectedId, setSelectedId] = useState(initialId)
      const [dropdownOpen, setDropdownOpen] = useState(false)
      const dropdownRef = useRef(null)

      useEffect(() => {
        if (!currentView) return
        const match = screens.find(s => s.view === currentView)
        if (match) setSelectedId(match.id)
      }, [currentView])

      useEffect(() => {
        const h = e => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setDropdownOpen(false) }
        document.addEventListener('mousedown', h)
        return () => document.removeEventListener('mousedown', h)
      }, [])

      if (!screens.length) return null

      const selected = screens.find(s => s.id === selectedId) ?? screens[0]

      return (
        <div className="space-y-3">
          {/* FlowSelector */}
          {flows && flows.length > 1 && (
            <FlowSelector flows={flows} activeId={activeFlowId} onChange={onFlowChange} />
          )}

          {/* Dropdown de telas — standalone, sem card wrapper */}
          <div ref={dropdownRef} className="relative">
            <button type="button" onClick={() => setDropdownOpen(v => !v)}
              className="w-full flex items-center justify-between gap-2 px-3 py-2.5 rounded-xl bg-white border border-[#e9ecef] hover:border-[#c7d2e8] transition-colors text-left">
              <div className="flex items-center gap-2 min-w-0">
                <span className="text-[#9ca3af] shrink-0"><IRoute s={13} /></span>
                <span className="text-[13px] font-semibold text-[#1f2937] truncate">{selected?.label ?? '—'}</span>
                {selected?.tags?.map(t => (
                  <span key={t} className="text-[10px] px-1.5 py-0.5 rounded-full bg-[#eef1f7] text-[#000050] shrink-0">{t}</span>
                ))}
              </div>
              <span className={cn('text-[#9ca3af] shrink-0 transition-transform', dropdownOpen && 'rotate-180')}>
                <IChevD s={14} />
              </span>
            </button>

            {dropdownOpen && (
              <div className="absolute left-0 right-0 top-full mt-1 z-50 bg-white border border-[#e9ecef] rounded-xl shadow-lg overflow-hidden">
                {screens.map(screen => {
                  const isActive = screen.id === selectedId
                  return (
                    <button key={screen.id} type="button"
                      onClick={() => {
                        setSelectedId(screen.id)
                        setDropdownOpen(false)
                        onTrigger?.(`navigate:${screen.view}`)
                      }}
                      className={cn('w-full text-left flex items-start gap-3 px-3 py-2.5 hover:bg-[#f8f9fb] transition-colors', isActive && 'bg-[#f0f2f8]')}>
                      <span className={cn('mt-[3px] shrink-0', isActive ? 'text-[#000050]' : 'text-[#9ca3af]')}>
                        <IDot s={13} />
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className={cn('text-[13px] font-semibold', isActive ? 'text-[#000050]' : 'text-[#1f2937]')}>{screen.label}</span>
                          {screen.tags?.map(t => (
                            <span key={t} className="text-[10px] px-1.5 py-0.5 rounded-full bg-[#eef1f7] text-[#000050]">{t}</span>
                          ))}
                        </div>
                        <p className="text-[12px] text-[#6b7280] mt-0.5 leading-snug">{screen.description}</p>
                      </div>
                    </button>
                  )
                })}
              </div>
            )}
          </div>
        </div>
      )
    }

    // ─── Section ──────────────────────────────────────────────────────────────
    function Section({ section, onTrigger, onClose }) {
      const [open, setOpen] = useState(true)
      const hasContent =
        section.states?.length > 0 || section.fields?.length > 0 ||
        section.rules?.length > 0 || section.notes?.length > 0 ||
        section.groups?.some(g => g.messages?.length > 0)
      if (!hasContent) return null
      return (
        <div className="border-b border-[#e9ecef] last:border-b-0">
          <button type="button" onClick={() => setOpen(v => !v)}
            className="w-full flex items-center justify-between px-6 py-3 hover:bg-[#f8f9fb] transition-colors text-left">
            <span className="text-[13px] font-bold text-[#00053c]">{section.title}</span>
            <span className="text-[#6b7280] shrink-0">{open ? <IChevD /> : <IChevR />}</span>
          </button>
          {open && (
            <div className="px-6 pb-6 pt-2 space-y-4">
              {section.states?.length > 0 && (
                <div>
                  <p className="text-[11px] font-semibold text-[#9ca3af] uppercase tracking-[0.5px] mb-2">States</p>
                  <div className="space-y-1">
                    {section.states.map(s => s.trigger && onTrigger ? (
                      <button key={s.name} type="button"
                        onClick={() => { onTrigger(s.trigger); if (s.closesDrawer) onClose?.() }}
                        className="w-full text-left flex items-center gap-2 px-2 py-1.5 -mx-2 rounded-lg hover:bg-[#f0f2f8] transition-colors group">
                        <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: s.color }} />
                        <div className="flex-1 min-w-0">
                          <span className="text-[13px] font-semibold text-[#1f2937] group-hover:text-[#000050] transition-colors">{s.name}</span>
                          <span className="text-[13px] text-[#6b7280]"> — {s.description}</span>
                        </div>
                        {s.closesDrawer && <span className="text-[10px] text-[#9ca3af] italic shrink-0">fecha drawer</span>}
                        <span className="shrink-0 text-[#d1d5db] group-hover:text-[#000050] transition-colors"><IPlay /></span>
                      </button>
                    ) : (
                      <div key={s.name} className="flex items-start gap-2 px-2 py-1.5">
                        <span className="mt-[5px] w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: s.color }} />
                        <div>
                          <span className="text-[13px] font-semibold text-[#1f2937]">{s.name}</span>
                          <span className="text-[13px] text-[#6b7280]"> — {s.description}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {section.fields?.length > 0 && (
                <div>
                  <p className="text-[11px] font-semibold text-[#9ca3af] uppercase tracking-[0.5px] mb-2">Fields</p>
                  <div className="space-y-2">
                    {section.fields.map(f => (
                      <div key={f.name} className="flex items-start gap-2">
                        <div className="mt-0.5 flex items-center gap-1 w-[120px] shrink-0">
                          <span className="text-[12px] font-semibold text-[#1f2937]">{f.name}</span>
                          {f.required ? <span className="text-[10px] font-bold text-[#ef4444]">*</span> : <span className="text-[10px] text-[#9ca3af]">opt</span>}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-[13px] text-[#6b7280] leading-snug">{f.description}</p>
                          {f.type && (
                            <span className={cn('inline-block mt-1 text-[10px] font-semibold px-1.5 py-0.5 rounded',
                              f.type === 'multi' ? 'bg-[#eef1f7] text-[#000050]' : 'bg-[#f3f4f6] text-[#6b7280]')}>
                              {f.type === 'multi' ? 'multi-select' : 'single select'}
                            </span>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {section.rules?.length > 0 && (
                <div>
                  <p className="text-[11px] font-semibold text-[#9ca3af] uppercase tracking-[0.5px] mb-2">Rules</p>
                  <ul className="space-y-1.5">
                    {section.rules.map((r, i) => (
                      <li key={i} className="flex items-start gap-2">
                        <span className="mt-[7px] w-1 h-1 rounded-full bg-[#000050] shrink-0" />
                        <p className="text-[13px] text-[#374151] leading-relaxed">{r}</p>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
              {section.notes?.length > 0 && (
                <div className="bg-[#fffbeb] border border-[#fde68a] rounded-lg px-3 py-2.5">
                  <p className="text-[11px] font-semibold text-[#92400e] uppercase tracking-[0.4px] mb-1.5">Dev note</p>
                  <ul className="space-y-1">
                    {section.notes.map((n, i) => <li key={i} className="text-[13px] text-[#78350f] leading-relaxed">{n}</li>)}
                  </ul>
                </div>
              )}
              {section.groups?.length > 0 && (
                <div className="space-y-4">
                  {section.groups.map(group => (
                    <div key={group.name}>
                      <div className="flex items-center gap-2 mb-2">
                        <p className="text-[11px] font-semibold text-[#9ca3af] uppercase tracking-[0.5px]">{group.name}</p>
                        <div className="flex-1 h-px bg-[#e9ecef]" />
                      </div>
                      <div className="space-y-2">
                        {group.messages.map((msg, i) => (
                          <div key={i} className="border border-[#e9ecef] rounded-lg px-3 py-2.5 bg-white">
                            <div className="flex items-center justify-between gap-2 mb-1.5">
                              <p className="text-[11px] text-[#9ca3af]">{msg.scenario}</p>
                              <span className={cn('shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded-full',
                                msg.display === 'inline-error' ? 'bg-[#fee2e2] text-[#dc2626]' : 'bg-[#dcfce7] text-[#16a34a]')}>
                                {msg.display === 'inline-error' ? 'inline error' : 'snackbar'}
                              </span>
                            </div>
                            <div className="flex items-start justify-between gap-2">
                              <p className="text-[13px] text-[#1f2937] leading-relaxed italic">"{msg.message}"</p>
                              <CopyButton text={msg.message} />
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )
    }

    // ─── SearchBar ────────────────────────────────────────────────────────────
    function SearchBar({ query, onChange }) {
      return (
        <div className="px-4 py-3 border-b border-[#e9ecef] shrink-0">
          <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#f8f9fb] border border-[#e9ecef] focus-within:border-[#000050] focus-within:bg-white transition-colors">
            <span className="text-[#9ca3af] shrink-0"><ISearch /></span>
            <input type="text" value={query} onChange={e => onChange(e.target.value)}
              placeholder="Buscar telas, estados, specs…"
              className="flex-1 bg-transparent text-[13px] text-[#1f2937] outline-none" />
            {query && (
              <button type="button" onClick={() => onChange('')} className="text-[#9ca3af] hover:text-[#374151]">
                <IX s={13} />
              </button>
            )}
          </div>
        </div>
      )
    }

    // ─── Snackbar ─────────────────────────────────────────────────────────────
    function Snackbar({ message, onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t) }, [])
      return (
        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 z-[60] bg-[#1f2937] text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-[13px] font-semibold animate-pulse-once">
          <span className="text-[#4ade80]"><ICheck s={16} /></span>
          {message}
          <button onClick={onClose} className="ml-2 text-[#9ca3af] hover:text-white"><IX s={14} /></button>
        </div>
      )
    }

    // ─── DevModeDrawer ────────────────────────────────────────────────────────
    function DevModeDrawer({ onTrigger, subtitle, currentView, sectionsByView, screens, flows, buttonPosition = 'right' }) {
      const [open, setOpen] = useState(false)
      const [query, setQuery] = useState('')
      const [activeFlowId, setActiveFlowId] = useState(flows?.[0]?.id ?? '')

      const resolvedSections = sectionsByView && currentView
        ? (sectionsByView[currentView] ?? [])
        : []

      const filteredSections = useMemo(() => {
        if (!query.trim()) return resolvedSections
        return resolvedSections.filter(s => sectionMatchesQuery(s, query.trim()))
      }, [query, resolvedSections, currentView])

      const filteredScreens = useMemo(() => {
        if (!query.trim()) return screens ?? []
        const q = query.toLowerCase()
        return (screens ?? []).filter(s =>
          s.label.toLowerCase().includes(q) ||
          s.description.toLowerCase().includes(q) ||
          s.tags?.some(t => t.toLowerCase().includes(q)) ||
          s.states?.some(st => st.label.toLowerCase().includes(q))
        )
      }, [query, screens])

      const btnPosClass =
        buttonPosition === 'left'   ? 'left-6' :
        buttonPosition === 'center' ? 'left-1/2 -translate-x-1/2' :
        'right-6'

      const VIEW_LABELS = { dashboard: 'Dashboard', calculator: 'Calculator', settings: 'Settings' }
      const viewLabel = currentView ? VIEW_LABELS[currentView] ?? currentView : ''

      return (
        <>
          <button type="button" onClick={() => setOpen(v => !v)}
            className={cn('fixed bottom-6 z-50 flex items-center gap-2 px-4 py-2.5 rounded-full shadow-lg transition-all', btnPosClass,
              open ? 'bg-[#1f2937] text-white' : 'bg-[#000050] text-white hover:opacity-90')}>
            <ICode />
            <span className="text-[13px] font-semibold">Dev</span>
          </button>

          {open && <div className="fixed inset-0 z-40 bg-black/10" onClick={() => setOpen(false)} />}

          <div className={cn('fixed top-0 right-0 h-full w-[500px] z-50 bg-white border-l border-[#e5e7eb] flex flex-col transition-transform duration-300',
            open ? 'translate-x-0' : 'translate-x-full')}
            style={{ boxShadow: '-4px 0 24px rgba(0,0,0,0.08)' }}>

            {/* Header */}
            <div className="flex items-center justify-between px-6 py-4 border-b border-[#e9ecef] shrink-0">
              <div>
                <p className="text-[15px] font-bold text-[#00053c]">Dev Specs</p>
                <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                  <span className="text-[13px] text-[#9ca3af]">
                    {subtitle}
                    {viewLabel && <span className="text-[#374151] font-semibold"> · {viewLabel}</span>}
                  </span>
                  <span className="text-[#d1d5db] text-[12px] select-none">|</span>
                  <button type="button" onClick={openFlowDiagram}
                    className="flex items-center gap-1 text-[12px] text-[#000050] font-semibold hover:underline underline-offset-2 transition-colors">
                    Flow Diagram
                    <IExtLink s={10} />
                  </button>
                </div>
              </div>
              <button type="button" onClick={() => setOpen(false)}
                className="p-1.5 rounded-lg text-[#9ca3af] hover:text-[#374151] hover:bg-[#f3f4f6] transition-colors shrink-0">
                <IX />
              </button>
            </div>

            {/* SearchBar — full width */}
            <div className="px-6 py-3 border-b border-[#e9ecef] shrink-0">
              <div className="flex items-center gap-2 px-3 py-2 rounded-lg bg-[#f8f9fb] border border-[#e9ecef] focus-within:border-[#000050] focus-within:bg-white transition-colors">
                <span className="text-[#9ca3af] shrink-0"><ISearch /></span>
                <input type="text" value={query} onChange={e => setQuery(e.target.value)}
                  placeholder="Buscar telas, estados, specs…"
                  className="flex-1 bg-transparent text-[13px] text-[#1f2937] outline-none min-w-0" />
                {query && (
                  <button type="button" onClick={() => setQuery('')} className="text-[#9ca3af] hover:text-[#374151]">
                    <IX s={13} />
                  </button>
                )}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto">
              <div className="px-6 py-5 border-b border-[#e9ecef]">
              {/* Telas & Estados */}
              {!query
                ? <ScreensSection screens={screens ?? []} currentView={currentView} flows={flows} activeFlowId={activeFlowId} onFlowChange={setActiveFlowId} onTrigger={onTrigger} />
                : filteredScreens.length > 0 && <ScreensSection screens={filteredScreens} currentView={currentView} flows={flows} activeFlowId={activeFlowId} onFlowChange={setActiveFlowId} onTrigger={onTrigger} />
              }
              </div>

              {/* Seções da view atual */}
              {filteredSections.length > 0
                ? filteredSections.map(s => <Section key={s.id} section={s} onTrigger={onTrigger} onClose={() => setOpen(false)} />)
                : query
                  ? <div className="flex flex-col items-center justify-center py-12 text-center gap-2">
                      <span className="text-[#d1d5db]"><ISearch s={20} /></span>
                      <p className="text-[13px] text-[#9ca3af]">Nenhum resultado encontrado</p>
                      <p className="text-[11px] text-[#c4c9d4]">"{query}"</p>
                    </div>
                  : !query && resolvedSections.length === 0
                    ? <div className="flex flex-col items-center justify-center py-10 text-center gap-1 px-4">
                        <p className="text-[13px] text-[#9ca3af]">Nenhuma seção para esta view.</p>
                        <p className="text-[11px] text-[#c4c9d4]">Adicione seções em SECTIONS_BY_VIEW['{currentView}'].</p>
                      </div>
                    : null
              }

              <div className="text-[11px] text-[#9ca3af] text-center py-4 border-t border-[#e9ecef]">
                Flow Platform · DevModeDrawer · contextual sections ✓
              </div>
            </div>
          </div>
        </>
      )
    }

    // ─── Fake Prototype ───────────────────────────────────────────────────────
    const VIEW_CONTENT = {
      dashboard: {
        title: 'Dashboard',
        body: () => (
          <div className="space-y-3">
            {['Alpha Project', 'Beta Project', 'Gamma Project'].map((p, i) => (
              <div key={p} className="bg-white rounded-xl border border-[#e2e8f0] p-4 flex items-center gap-4">
                <div className="w-8 h-8 rounded-lg bg-[#eef1f7] shrink-0" />
                <div className="flex-1 space-y-1.5">
                  <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: `${40+i*15}%` }} />
                  <div className="h-2.5 rounded-full bg-[#f8fafc]" style={{ width: `${55+i*10}%` }} />
                </div>
                <div className="text-[13px] font-semibold text-[#000050]">{12+i*8} BCPs</div>
              </div>
            ))}
          </div>
        ),
      },
      calculator: {
        title: 'Calculator',
        body: () => (
          <div className="space-y-3">
            <div className="bg-white rounded-xl border border-[#e2e8f0] p-4 flex gap-3">
              <div className="flex-1 h-9 rounded-lg bg-[#f8fafc] border border-[#e2e8f0]" />
              <div className="flex-1 h-9 rounded-lg bg-[#f8fafc] border border-[#e2e8f0]" />
              <div className="w-28 h-9 rounded-lg bg-[#000050]" />
            </div>
            {[1,2,3,4].map(i => (
              <div key={i} className="bg-white rounded-xl border border-[#e2e8f0] p-4 flex items-center gap-3">
                <div className="w-4 h-4 rounded border border-[#e2e8f0] bg-[#f8fafc] shrink-0" />
                <div className="flex-1 space-y-1.5">
                  <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: `${35+i*12}%` }} />
                </div>
                <div className="w-12 h-5 rounded-full bg-[#eef1f7]" />
              </div>
            ))}
          </div>
        ),
      },
      settings: {
        title: 'Settings',
        body: () => (
          <div className="bg-white rounded-xl border border-[#e2e8f0] p-6 max-w-lg space-y-5">
            {['Calculator Model', 'Issue Types', 'Team Size'].map((label, i) => (
              <div key={label} className="space-y-1.5">
                <div className="h-3 rounded-full bg-[#f1f5f9]" style={{ width: `${20+i*10}%` }} />
                <div className="h-9 rounded-lg bg-[#f8fafc] border border-[#e2e8f0]" />
              </div>
            ))}
            <div className="pt-2">
              <div className="h-9 w-full rounded-lg bg-[#000050]" />
            </div>
          </div>
        ),
      },
    }

    function FakePrototype({ currentView, setCurrentView, onSnackbar }) {
      const tabs = ['dashboard', 'calculator', 'settings']
      const content = VIEW_CONTENT[currentView]
      return (
        <div className="min-h-screen bg-[#f8fafc]">
          <div className="h-14 bg-white border-b border-[#e2e8f0] flex items-center px-6 gap-3">
            <div className="w-6 h-6 rounded bg-[#000050]" />
            <span className="text-[14px] font-bold text-[#00053c]">Flow Platform</span>
            <span className="text-[#e2e8f0]">|</span>
            <span className="text-[14px] font-semibold text-[#000050]">BCP Calculator</span>
            <div className="flex-1" />
            <div className="w-7 h-7 rounded-full bg-[#eef1f7]" />
          </div>

          {/* Nav tabs */}
          <div className="bg-white border-b border-[#e2e8f0] px-6 flex gap-1">
            {tabs.map(tab => (
              <button key={tab} type="button" onClick={() => setCurrentView(tab)}
                className={cn('px-4 py-3 text-[13px] font-semibold border-b-2 transition-colors capitalize',
                  currentView === tab
                    ? 'border-[#000050] text-[#000050]'
                    : 'border-transparent text-[#9ca3af] hover:text-[#374151]')}>
                {tab === 'dashboard' ? 'Dashboard' : tab === 'calculator' ? 'Calculator' : 'Settings'}
              </button>
            ))}
          </div>

          <div className="max-w-3xl mx-auto pt-8 px-8 pb-24">
            <h2 className="text-[20px] font-bold text-[#00053c] mb-6">{content.title}</h2>
            {content.body()}
            <p className="text-center text-[11px] text-[#c4c9d4] mt-10">
              — Protótipo fictício · mude de aba e veja as seções da drawer mudarem —
            </p>
          </div>
        </div>
      )
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [currentView, setCurrentView] = useState('dashboard')
      const [snackbar, setSnackbar] = useState(null)

      function handleTrigger(action) {
        console.log('[DevModeDrawer] trigger:', action)
        if (action === 'state:calculator:success') {
          setSnackbar('Calculated successfully. 104 issues · 38 recalculated.')
        }
        // outros triggers: navegar entre views
        if (action.startsWith('navigate:')) {
          setCurrentView(action.replace('navigate:', ''))
        }
        if (action.startsWith('state:')) {
          const [, view] = action.split(':')
          setCurrentView(view)
        }
      }

      return (
        <>
          <FakePrototype currentView={currentView} setCurrentView={setCurrentView} />
          <DevModeDrawer
            subtitle="BCP Calculator"
            currentView={currentView}
            sectionsByView={SECTIONS_BY_VIEW}
            screens={SCREENS}
            flows={FLOW_ROUTES}
            buttonPosition="right"
            onTrigger={handleTrigger}
          />
          {snackbar && <Snackbar message={snackbar} onClose={() => setSnackbar(null)} />}
        </>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
